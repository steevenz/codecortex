[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts = -q --disable-warnings --maxfail=1 --cov=src.core --cov=src.domain.coderepository --cov=src.domain.codeindex --cov=src.domain.codegraph --cov=src.domain.coderefactor --cov=src.main --cov=scripts.server.http --cov-report=term-missing --cov-fail-under=80 --cov-config=.coveragerc

