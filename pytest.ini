[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts = -q --disable-warnings --maxfail=1 --cov=src.core --cov=src.modules.coderepository --cov=src.modules.codeindex --cov=src.modules.codegraph --cov=src.modules.coderefactor --cov=src.modules.filesystem --cov=src.modules.codeanalysis --cov=src.main --cov=scripts.server.http --cov-report=term-missing --cov-fail-under=80 --cov-config=.coveragerc

