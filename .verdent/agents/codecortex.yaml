name: codecortex
version: "1.2.0"
description: Code intelligence via MCP — codebase analysis, graph queries, refactoring, architecture audit, cross-IDE memory, and project scaffolding

mcp_servers:
  - command: uv
    args:
      - --directory
      - /path/to/mcp-codecortex
      - run
      - python
      - -m
      - src.main

tools:
  - codecortex:repository
  - codecortex:codebase
  - codecortex:filesystem
  - codecortex:knowledge
  - codecortex:idegraph
  - codecortex:scaffolder

rules:
  - ALL codebase operations MUST use CodeCortex MCP Server
  - Run graph build before architecture queries
  - Analyze impact before modifications
  - Verify with audit post-change

workflow:
  - action: search
    tool: codecortex:codebase
    args: { query: "<target>", semantic: true }
  - action: graph_build
    tool: codecortex:codebase
    args: { sub_action: "build" }
  - action: impact
    tool: codecortex:codebase
    args: { sub_action: "impact" }
  - action: audit
    tool: codecortex:codebase
  - action: test
    tool: codecortex:codebase
    args: { sub_action: "run" }
