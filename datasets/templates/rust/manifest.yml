stack:
  name: rust
  display_name: "Rust"
  version: "1.75"
  file_conventions:
    directories: snake_case
    modules: "snake_case.rs"
    classes: PascalCase

project_types:
  - id: standard
    display_name: "Standard Rust Project"
    description: "Minimal, standard-compliant Rust project"
    pattern: layered
    dependencies: []
    conditional_modules:
      ai: false
      trainer: false

template_files:
  base: []
  setup_scripts: []

header_format: |
  /**
   * @project   {{ project_name }}
   * @package   {{ package_path }}
   * @author    {{ author }}
   * @copyright (c) {{ author }}
   * @fileoverview {{ description }}
   */
