stack:
  name: typescript
  display_name: "TypeScript"
  version: "5.7"
  file_conventions:
    directories: kebab-case
    modules: "PascalCase.ts"
    classes: PascalCase

project_types:
  - id: standard
    display_name: "Standard TypeScript Project"
    description: "Minimal, standard-compliant TypeScript project for Node.js"
    pattern: layered
    dependencies: []
    conditional_modules:
      ai: false
      trainer: false

template_files:
  base: []
  setup_scripts: []

header_format: |
  /**
   * @project   {{ project_name }}
   * @package   {{ package_path }}
   * @author    {{ author }}
   * @copyright (c) {{ author }}
   * @fileoverview {{ description }}
   */
