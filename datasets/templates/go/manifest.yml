stack:
  name: go
  display_name: "Go"
  version: "1.23"
  file_conventions:
    directories: snake_case
    modules: "snake_case.go"
    classes: PascalCase

project_types:
  - id: standard
    display_name: "Standard Go Project"
    description: "Minimal, standard-compliant Go project"
    pattern: layered
    dependencies: []
    conditional_modules:
      ai: false
      trainer: false

template_files:
  base: []
  setup_scripts: []

header_format: |
  /*
   * @project   {{ project_name }}
   * @package   {{ package_path }}
   * @author    {{ author }}
   * @copyright (c) {{ author }}
   * @fileoverview {{ description }}
   */
