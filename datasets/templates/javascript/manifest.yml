stack:
  name: javascript
  display_name: "JavaScript"
  version: "22"
  file_conventions:
    directories: kebab-case
    modules: "PascalCase.js"
    classes: PascalCase

project_types:
  - id: standard
    display_name: "Standard JavaScript Project"
    description: "Minimal, standard-compliant JavaScript project for Node.js"
    pattern: layered
    dependencies: []
    conditional_modules:
      ai: false
      trainer: false

template_files:
  base: []
  setup_scripts: []

header_format: |
  /**
   * @project   {{ project_name }}
   * @package   {{ package_path }}
   * @author    {{ author }}
   * @copyright (c) {{ author }}
   * @fileoverview {{ description }}
   */
