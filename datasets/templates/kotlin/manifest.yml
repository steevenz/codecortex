stack:
  name: kotlin
  display_name: "Kotlin"
  version: "2.0"
  file_conventions:
    directories: lowercase
    modules: "PascalCase.kt"
    classes: PascalCase

project_types:
  - id: standard
    display_name: "Standard Kotlin Project"
    description: "Minimal, standard-compliant Kotlin project (Gradle Kotlin DSL)"
    pattern: layered
    dependencies: []
    extra_directories:
      - "src/main/kotlin/app"
      - "src/test/kotlin/app"
    conditional_modules:
      ai: false
      trainer: false

template_files:
  base: []
  setup_scripts: []

header_format: |
  /**
   * @project   {{ project_name }}
   * @package   {{ package_path }}
   * @author    {{ author }}
   * @copyright (c) {{ author }}
   * @fileoverview {{ description }}
   */
